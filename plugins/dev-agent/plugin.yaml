id: dev-agent
name: Dev Agent
version: 1.0.0
description: Senior software engineer agent — planning, development, code review, and testing for PHP, Go, TypeScript, and PostgreSQL
author: Jhol Hewres
license: MIT
min_devclaw: "1.14.0"

requires:
  any_bins: ["git"]

agents:
  - id: dev
    name: Dev Agent
    description: Senior software engineer specializing in PHP (Laravel), Go, TypeScript (React/Node.js), and PostgreSQL — handles planning, development, code review, and testing
    instructions: prompts/dev-agent.md
    triggers:
      - "review this code"
      - "code review"
      - "review my pr"
      - "review the code"
      - "plan the implementation"
      - "plan this feature"
      - "write tests"
      - "create tests"
      - "test this"
      - "fix this bug"
      - "implement this"
      - "develop this feature"
      - "refactor this"
      - "optimize this query"
      - "create a migration"
      - "write an api endpoint"
      - "dev agent"
    tools:
      allow:
        - read_file
        - write_file
        - edit_file
        - list_files
        - search_files
        - glob_files
        - bash
        - git_status
        - git_diff
        - git_log
        - git_commit
        - web_search
        - web_fetch
        - db_query
        - db_execute
        - db_schema
      deny:
        - ssh
        - scp
        - group:vault
        - group:subagents
        - group:daemon
        - group:browser
    max_turns: 40
    timeout_sec: 900
    session_mode: shared
    escalation:
      enabled: true
      keywords:
        - "I'm stuck"
        - "need help"
        - "escalate"
        - "can't figure this out"
        - "out of my scope"
      max_turns: 35
      explicit_only: false

ui:
  icon: "terminal"
  category: "development"
  color: "#10B981"
